<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Layer 1: tv — big TV: screen shell, stand neck + base -->
  <defs><linearGradient id="acc" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8B5CF6"/><stop offset="1" stop-color="#EC4899"/></linearGradient></defs>
  <!-- Layer 2: reel — film reel centered on the TV screen -->
  <g id="reel">
    <circle cx="128" cy="103" r="52" fill="none" stroke="url(#acc)" stroke-width="10"/>
    <circle cx="128" cy="68"  r="10" fill="url(#acc)" fill-opacity="0.55"/>
    <circle cx="161" cy="92"  r="10" fill="url(#acc)" fill-opacity="0.55"/>
    <circle cx="148" cy="131" r="10" fill="url(#acc)" fill-opacity="0.55"/>
    <circle cx="108" cy="131" r="10" fill="url(#acc)" fill-opacity="0.55"/>
    <circle cx="95"  cy="92"  r="10" fill="url(#acc)" fill-opacity="0.55"/>
  </g>

  <!-- Layer 3: play — triangle as the reel's hub -->
  <!-- Layer 4: controller — gamepad by the reel's lower-right. Dark halo first (separates it
       from the purple reel ring behind), then the purple body, then dark D-pad/buttons. -->
  </svg>
