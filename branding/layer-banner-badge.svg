<svg xmlns="http://www.w3.org/2000/svg" width="640" height="256" viewBox="0 0 640 256">
  <!-- Layer 1: badge — rounded dark plate behind everything -->
  <defs><linearGradient id="acc" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8B5CF6"/><stop offset="1" stop-color="#EC4899"/></linearGradient></defs>
  <g id="badge">
    <rect x="8" y="8" width="624" height="240" rx="28" fill="#14121a"/>
    <rect x="8" y="8" width="624" height="240" rx="28" fill="none" stroke="url(#acc)" stroke-opacity="0.35" stroke-width="2"/>
  </g>

  <!-- Layer 2: reel — film reel: outer ring + five spoke-holes (play triangle is the hub) -->
  <!-- Layer 3: play — triangle as the reel's hub -->
  <!-- Layer 4: wordmark — "FullReel", Reel in accent -->
  </svg>
